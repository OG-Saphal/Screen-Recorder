name: Build ScreenRec.exe
on: [push]
jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          pip install mss numpy opencv-python-headless sounddevice keyboard Pillow pyinstaller
          pip install pyaudio   # ✅ directly from PyPI (official wheels available)          
      - name: Build exe
        run: pyinstaller screenrec.spec
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ScreenRec
          path: dist/ScreenRec.exe
