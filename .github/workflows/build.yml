name: Build ScreenRec.exe
on: [push]
jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          pip install mss numpy opencv-python-headless sounddevice keyboard Pillow pyinstaller
          pip install pyaudio   # ✅ directly from PyPI (official wheels available)
      - name: Build exe
        run: |
          pyinstaller --onefile --windowed --name ScreenRec `
            --add-data "ui;ui" `
            --hidden-import ffmpeg_probe `
            --hidden-import recorder `
            --hidden-import capture `
            --hidden-import audio `
            --hidden-import hotkeys `
            --hidden-import utils `
            --hidden-import "ui.app_window" `
            --hidden-import "ui.styles" `
            main.py
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ScreenRec
          path: dist/ScreenRec.exe
